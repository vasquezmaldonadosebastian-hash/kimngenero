services:
  kimngenero:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: node:20-alpine
        REPO_URL: https://github.com/VasquezMaldonadoSebastian/KimnGenero.git
        REPO_REF: main
    container_name: kimngenero
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      INDICATOR_REPOSITORY: memory
      CSP_REPORT_ONLY: "true"
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    networks:
      - kimngenero_net

